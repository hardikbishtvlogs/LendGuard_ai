events {}
http { upstream api { server backend:8000; } upstream web { server frontend:3000; } server { listen 80; client_max_body_size 10m; location /api/ { proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; } location / { proxy_pass http://web; proxy_set_header Host $host; } } }
